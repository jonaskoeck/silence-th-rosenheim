workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == "develop"

stages:
  - build
  - test
  - deploy

build-assets:
  stage: build
  image: node:22-alpine
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - backend/node_modules/
  script:
    - cd backend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - backend/public/build/
    expire_in: 1 day

test:
  stage: test
  image: php:8.4-cli
  services:
    - name: mariadb:12
      alias: mariadb
  variables:
    # MariaDB service configuration
    MARIADB_DATABASE: silence
    MARIADB_ROOT_PASSWORD: root
    MARIADB_USER: backend
    MARIADB_PASSWORD: backend123
    # Laravel DB connection (DB_HOST matches the service alias)
    DB_CONNECTION: mariadb
    DB_HOST: mariadb
    DB_PORT: "3306"
    DB_DATABASE: silence
    DB_USERNAME: backend
    DB_PASSWORD: backend123
  cache:
    key:
      files:
        - backend/composer.lock
    paths:
      - backend/vendor/
  before_script:
    - apt-get update -qq && apt-get install -y -qq libzip-dev unzip git
    - docker-php-ext-install zip pdo pdo_mysql
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - cd backend
    - composer install --no-interaction --prefer-dist
    - cp .env.example .env
    - php artisan key:generate
    - php artisan migrate --force
    - php artisan test

deploy-dev:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  needs:
    - build-assets
    - test
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d > /tmp/deploy_key
    - chmod 400 /tmp/deploy_key
    - ssh-add /tmp/deploy_key
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan axm-sep-silence-01.th-rosenheim.de >> ~/.ssh/known_hosts
  script:
    - ssh student@axm-sep-silence-01.th-rosenheim.de "
        cd /home/student/silence &&
        git pull origin develop &&
        docker compose up --build -d --remove-orphans
      "
  environment:
    name: development
    url: https://silence.th-rosenheim.de
