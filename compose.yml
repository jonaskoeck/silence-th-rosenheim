services:
  database:
    image: mariadb:12
    container_name: silence-db
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_USER: ${DB_LARAVEL_USER}
      MARIADB_PASSWORD: ${DB_LARAVEL_PASSWORD}
    volumes:
      - silence-db-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    restart: on-failure:5
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/healthcheck.sh",
          "--connect",
          "--innodb_initialized",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  silence-db-data:
