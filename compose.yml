services:

  traefik:
    image: traefik:v3
    container_name: silence-traefik
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/traefik/certs.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/student/certificates/web/silence.crt:/certs/silence.crt:ro
      - /home/student/certificates/web/silence.key:/certs/silence.key:ro
      - ./traefik/certs.yml:/traefik/certs.yml:ro
    networks:
      - silence-internal
    restart: unless-stopped

  database:
    image: mariadb:12
    container_name: silence-db
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_USER: ${DB_LARAVEL_USER}
      MARIADB_PASSWORD: ${DB_LARAVEL_PASSWORD}
    volumes:
      - silence-db-data:/var/lib/mysql
    networks:
      - silence-internal
    labels:
      - "traefik.enable=false"
    ports:
      - "127.0.0.1:3306:3306"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/healthcheck.sh",
          "--connect",
          "--innodb_initialized",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  application:
    build: ./backend
    container_name: silence-app
    env_file:
      - .env
    networks:
      - silence-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.silence.rule=Host(`silence.th-rosenheim.de`)"
      - "traefik.http.routers.silence.entrypoints=websecure"
      - "traefik.http.routers.silence.tls=true"
      - "traefik.http.services.silence.loadbalancer.server.port=80"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build: ./backend
    container_name: silence-scheduler
    command: php artisan schedule:work
    env_file:
      - .env
    networks:
      - silence-internal
    labels:
      - "traefik.enable=false"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

volumes:
  silence-db-data:

networks:
  silence-internal:
    driver: bridge
